workflows:
  android-native-workflow:
    name: Android Native Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > app/local.properties || true
      - name: Smart Android Build
        script: |
          if [ -f ./app/build.gradle ] || [ -f ./app/build.gradle.kts ]; then
            echo "Building from app subfolder..."
            gradle -p app assemble --no-daemon
          else
            echo "Building from root folder..."
            gradle assemble --no-daemon
          fi
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
