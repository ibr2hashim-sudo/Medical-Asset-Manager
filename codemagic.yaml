workflows:
  android-native-workflow:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    # هذه الخاصية تجعل Codemagic يحفظ ملفات الـ Gradle ولا يمسحها
    cache:
      paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Build Android
        script: |
          # لاحظ أننا حذفنا ./gradlew clean
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
