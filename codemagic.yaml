workflows:
  android-debug-workflow:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Clean Project
        script: |
          # تنظيف ملفات البناء القديمة لمنع تضارب الكاش
          ./gradlew clean
      - name: Set up SDK
        script: |
          # تأكد من أنك تستخدم إصدار SDK الصحيح إذا لزم الأمر
          echo "SDK setup complete"
      - name: Build Android
        script: |
          # بناء المشروع
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
